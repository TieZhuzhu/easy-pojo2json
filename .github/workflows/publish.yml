# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Gradle Publish

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - v*

jobs:
  # Build the plugin package and upload it to GitHub Releases.
  release:
    name: Build Release Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          #settings-path: ${{ github.workspace }} # location for the settings.xml file

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          gradle-home-cache-cleanup: true

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      # Build the plugin package for GitHub Releases.
      # See https://github.com/JetBrains/intellij-platform-plugin-template
      - name: Build Plugin
        run: ./gradlew buildPlugin -x test

      - name: Generate Changelog
        run: |
          ./gradlew -q printChangelog > ${{ github.ref_name }}-CHANGELOG.md

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref_name != '' }}
        with:
          body_path: ${{ github.ref_name }}-CHANGELOG.md
          files: |
            ./build/distributions/*
            ./build/libs/*-standalone.jar
